# ============================================================
# THE DNA LEAGUE — nginx config
# Security headers + static file serving for multi-page app
# ============================================================

server {
    listen       80;
    server_name  localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────
    gzip            on;
    gzip_types      text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # ── Security Headers ─────────────────────────────────────
    # These are the same headers a hardened Red Hat / OpenShift
    # deployment would enforce. Each one maps to a real CVE class.

    # Prevent the page from being embedded in an iframe (clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from guessing MIME types (MIME-sniffing attacks)
    add_header X-Content-Type-Options "nosniff" always;

    # Only send the origin in the Referer header, not the full URL
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict which external resources the page can load (CSP)
    # Allows: self, Supabase CDN, our Cloudflare Worker, Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://dna-league.josephisaacii.workers.dev; img-src 'self' data: https:;" always;

    # Force HTTPS on all future requests from this browser
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static File Cache ────────────────────────────────────
    # CSS and JS files: cache for 1 week (they rarely change)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Page Routes ──────────────────────────────────────────
    # This app has three distinct HTML pages — NOT a SPA.
    # Each one is served directly; no index.html fallback needed.

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ── Custom 404 ───────────────────────────────────────────
    # Unknown URLs fall back to index.html (handles direct nav to hash routes)
    error_page 404 /index.html;
}
