# ============================================================
# THE DNA LEAGUE — Dependabot Configuration
# Automatically opens PRs when dependencies have updates.
# These PRs run through the security pipeline before merging.
# ============================================================

version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "joe2kool"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Only auto-update patch versions for major libraries
      # Major version bumps require manual review
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
