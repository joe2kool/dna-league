# ============================================================
# THE DNA LEAGUE — Security Pipeline
# Runs on every Pull Request targeting main.
# All checks must pass before merging is allowed.
# ============================================================

name: Security Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:

  # ── JOB 1: SECRET SCANNING ───────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for service_role key in frontend
        run: |
          echo "Scanning for service_role key references..."
          if grep -r "service_role" --include="*.html" --include="*.js" .; then
            echo "CRITICAL: service_role key found - this bypasses all RLS security"
            exit 1
          fi
          echo "No service_role key references found"

  # ── JOB 2: DEPENDENCY AUDIT ──────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: |
          echo "Running dependency vulnerability audit..."
          npm audit --audit-level=high || {
            echo "Vulnerabilities found - review above output"
            exit 1
          }
          echo "No high/critical vulnerabilities found"

      - name: Report CDN library references
        run: |
          echo "CDN libraries referenced in app:"
          grep -oh 'https://cdn[^"]*' index.html 2>/dev/null || \
          grep -oh 'https://cdn[^"]*' dna-league.html 2>/dev/null || \
          echo "No CDN references found"

  # ── JOB 3: JAVASCRIPT SECURITY LINT ─────────────────────
  js-security-lint:
    name: JS Security Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ESLint and security plugin
        run: npm install --save-dev eslint@8 eslint-plugin-security@3

      - name: Extract JavaScript from HTML
        run: |
          python3 - << 'PYEOF'
          import re

          filename = None
          for name in ['index.html', 'dna-league.html']:
              try:
                  with open(name, 'r') as f:
                      content = f.read()
                  filename = name
                  break
              except FileNotFoundError:
                  continue

          if not filename:
              print("No HTML file found")
              exit(1)

          scripts = re.findall(
              r'<script(?![^>]*\bsrc\b)[^>]*>(.*?)</script>',
              content, re.DOTALL
          )
          app_scripts = [s for s in scripts if len(s.strip()) > 200]

          with open('extracted-app.js', 'w') as f:
              f.write('\n'.join(app_scripts))

          print(f"Extracted {len(app_scripts)} script block(s) from {filename}")
          PYEOF

      - name: Write ESLint flat config
        run: |
          cat > eslint.config.mjs << 'ESLINTEOF'
          import security from 'eslint-plugin-security';

          export default [
            {
              files: ['extracted-app.js'],
              plugins: { security },
              languageOptions: {
                ecmaVersion: 2020,
                globals: {
                  window: 'readonly',
                  document: 'readonly',
                  console: 'readonly',
                  alert: 'readonly',
                  confirm: 'readonly',
                  localStorage: 'readonly',
                  navigator: 'readonly',
                  fetch: 'readonly',
                  Promise: 'readonly',
                  JSON: 'readonly',
                  Date: 'readonly',
                  Math: 'readonly',
                  parseInt: 'readonly',
                  parseFloat: 'readonly',
                  isNaN: 'readonly',
                  setTimeout: 'readonly',
                  clearTimeout: 'readonly',
                  supabase: 'readonly',
                },
              },
              rules: {
                'no-eval':                                'error',
                'no-implied-eval':                        'error',
                'no-new-func':                            'error',
                'security/detect-eval-with-expression':   'error',
                'security/detect-non-literal-regexp':     'warn',
                'security/detect-possible-timing-attacks':'warn',
              },
            },
          ];
          ESLINTEOF

      - name: Run ESLint security scan
        run: |
          npx eslint extracted-app.js --format stylish
          echo "JS security lint passed"

  # ── JOB 4: HTML VALIDATION ───────────────────────────────
  html-validation:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install HTML validator
        run: npm install --save-dev html-validate

      - name: Write HTML validate config
        run: |
          cat > .htmlvalidate.json << 'HTMLEOF'
          {
            "extends": ["html-validate:recommended"],
            "rules": {
              "no-inline-style":            "off",
              "prefer-native-element":      "off",
              "no-trailing-whitespace":     "off",
              "long-title":                 "off",
              "valid-id":                   "off",
              "script-type":                "off",
              "button-type":                "off",
              "no-redundant-role":          "off",
              "aria-label-misuse":          "off",
              "wcag/h30":                   "off",
              "wcag/h32":                   "off",
              "wcag/h36":                   "off",
              "wcag/h37":                   "off",
              "wcag/h67":                   "off",
              "wcag/h71":                   "off",
              "element-permitted-content":  "warn",
              "attr-quotes":                "error",
              "no-dup-attr":                "error",
              "no-dup-id":                  "error",
              "doctype-style":              "off"
            }
          }
          HTMLEOF

      - name: Validate HTML
        run: |
          FILE=$(ls index.html dna-league.html 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No HTML file found (index.html or dna-league.html)"
            exit 1
          fi
          echo "Validating $FILE..."
          npx html-validate "$FILE"
          echo "HTML validation passed"

  # ── JOB 5: SUPABASE SECURITY CHECK ──────────────────────
  supabase-security-check:
    name: Supabase Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Supabase configuration
        run: |
          echo "Running Supabase security checks..."
          FILE=$(ls index.html dna-league.html 2>/dev/null | head -1)
          FAIL=0

          if grep -q "service_role" "$FILE" 2>/dev/null; then
            echo "CRITICAL: service_role key in $FILE - bypasses ALL RLS"
            FAIL=1
          else
            echo "No service_role key in frontend"
          fi

          if grep -q "createClient" "$FILE" 2>/dev/null; then
            echo "Supabase client initialization found"
          else
            echo "WARNING: Supabase createClient not found"
          fi

          if grep -q "auth.getSession\|onAuthStateChange" "$FILE" 2>/dev/null; then
            echo "Authentication checks present"
          else
            echo "WARNING: No auth session checks found"
          fi

          if [ $FAIL -eq 1 ]; then
            echo "Supabase security check FAILED"
            exit 1
          fi
          echo "All Supabase security checks passed"

  # ── JOB 6: SECURITY SUMMARY ─────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs:
      - secret-scan
      - dependency-audit
      - js-security-lint
      - html-validation
      - supabase-security-check
    if: always()
    steps:
      - name: Post PR summary comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const jobs = {
              'Secret Scan':             '${{ needs.secret-scan.result }}',
              'Dependency Audit':        '${{ needs.dependency-audit.result }}',
              'JS Security Lint':        '${{ needs.js-security-lint.result }}',
              'HTML Validation':         '${{ needs.html-validation.result }}',
              'Supabase Security Check': '${{ needs.supabase-security-check.result }}'
            };
            const icon = r =>
              r === 'success' ? '✅' :
              r === 'failure' ? '❌' :
              r === 'skipped' ? '⏭️' : '⚠️';
            const allPassed = Object.values(jobs).every(r => r === 'success');
            let body = `## 🔒 Security Pipeline Results\n\n`;
            body += `| Check | Result |\n|---|---|\n`;
            for (const [name, result] of Object.entries(jobs)) {
              body += `| ${name} | ${icon(result)} ${result.toUpperCase()} |\n`;
            }
            body += '\n';
            body += allPassed
              ? `### ✅ All checks passed — safe to merge`
              : `### ❌ One or more checks failed — fix before merging`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
