# ============================================================
# THE DNA LEAGUE — Staging Deploy
# Deploys the staging branch to a /staging/ subdirectory
# on GitHub Pages so it can be previewed before merging to main.
#
# Staging URL: https://joe2kool.github.io/dna-league/staging/
# Production URL: https://joe2kool.github.io/dna-league/
# ============================================================

name: Deploy Staging

on:
  push:
    branches: [ staging ]
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to push to gh-pages branch
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:

      - name: Checkout staging branch
        uses: actions/checkout@v4.2.2
        with:
          ref: staging
          fetch-depth: 0

      - name: Checkout gh-pages branch (or create it)
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: gh-pages-checkout
          fetch-depth: 1
        continue-on-error: true  # gh-pages may not exist yet

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Confirm Node version
        run: node --version

      # ── BUILD STAGING DIRECTORY ────────────────────────────
      # Copy all repo files into a /staging/ subfolder so
      # production (root) and staging coexist on the same
      # gh-pages branch without interfering with each other.

      - name: Prepare staging directory
        run: |
          mkdir -p staging-build/staging

          # Copy all app files into staging/
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='staging-build' \
            --exclude='gh-pages-checkout' \
            . staging-build/staging/

          echo "Staging build contents:"
          ls -la staging-build/staging/

      - name: Write staging banner
        run: |
          # Inject a visible staging banner into index.html
          # so it's always clear you're on staging, not production
          python3 << 'PYEOF'
          import re

          with open('staging-build/staging/index.html', 'r') as f:
              content = f.read()

          banner = '''<div id="staging-banner" style="
            position:fixed;bottom:0;left:0;right:0;z-index:9999;
            background:rgba(201,168,76,0.95);color:#080b10;
            font-family:\'Barlow Condensed\',sans-serif;font-size:13px;
            letter-spacing:2px;text-transform:uppercase;
            padding:8px 1rem;text-align:center;
            display:flex;align-items:center;justify-content:center;gap:1rem;">
            ⚠ STAGING ENVIRONMENT — Not for production use
            <a href="https://joe2kool.github.io/dna-league/"
               style="color:#080b10;font-weight:700;text-decoration:underline;">
              View Production →
            </a>
          </div>'''

          # Insert banner right before </body>
          content = content.replace('</body>', banner + '\n</body>')

          with open('staging-build/staging/index.html', 'w') as f:
              f.write(content)

          print("Staging banner injected into index.html")

          # Also inject into draft.html if it exists
          import os
          draft_path = 'staging-build/staging/draft.html'
          if os.path.exists(draft_path):
              with open(draft_path, 'r') as f:
                  draft = f.read()
              draft = draft.replace('</body>', banner + '\n</body>')
              with open(draft_path, 'w') as f:
                  f.write(draft)
              print("Staging banner injected into draft.html")
          PYEOF

      # ── DEPLOY TO GH-PAGES ────────────────────────────────
      # We push only the /staging/ subfolder to the gh-pages branch.
      # The root of gh-pages stays as production (main branch deploys there).

      - name: Deploy staging to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./staging-build/staging
          destination_dir: staging
          keep_files:   true   # don't wipe production root
          commit_message: 'deploy: staging @ ${{ github.sha }}'

      # ── NOTIFY PR ─────────────────────────────────────────
      - name: Find associated PR and comment
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const sha    = context.sha;
            const branch = 'staging';

            // Find open PRs targeting staging or from staging
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${branch}`,
            });

            const stagingUrl = 'https://joe2kool.github.io/dna-league/staging/';
            const shortSha   = sha.slice(0, 7);

            const body = [
              '## 🧪 Staging Deployed',
              '',
              `**Commit:** \`${shortSha}\``,
              `**Branch:** \`${branch}\``,
              '',
              `| Environment | URL |`,
              `|---|---|`,
              `| 🧪 Staging | [${stagingUrl}](${stagingUrl}) |`,
              `| 🚀 Production | [https://joe2kool.github.io/dna-league/](https://joe2kool.github.io/dna-league/) |`,
              '',
              '> Test staging thoroughly before opening a PR to `main`.',
            ].join('\n');

            for (const pr of prs) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo:  context.repo.repo,
                body,
              });
              core.info(`Commented on PR #${pr.number}`);
            }

            if (prs.length === 0) {
              core.info('No open PRs found for staging branch — skipping comment');
            }
